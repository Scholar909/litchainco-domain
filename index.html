<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Litchainco</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0b0b0b;
color:#eaeaea;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:30px;
}

/* main container */

.wrapper{
max-width:520px;
width:100%;
}

/* subtle domain label */

.label{
font-size:12px;
letter-spacing:3px;
text-transform:uppercase;
opacity:.5;
margin-bottom:25px;
}

/* domain name */

h1{
font-size:42px;
font-weight:500;
letter-spacing:-1px;
margin-bottom:10px;
}

/* subtle underline accent */

.accent{
width:60px;
height:2px;
background:#ffffff;
opacity:.25;
margin:18px 0 28px 0;
}

/* description */

.desc{
font-size:16px;
line-height:1.6;
opacity:.75;
margin-bottom:35px;
}

/* price */

.price{
font-size:28px;
margin-bottom:28px;
font-weight:500;
}

/* buttons */

.actions{
display:flex;
gap:14px;
flex-wrap:wrap;
}

.btn{
padding:12px 22px;
border-radius:6px;
font-size:14px;
text-decoration:none;
transition:.25s ease;
}

.primary{
background:#ffffff;
color:#0b0b0b;
}

.primary:hover{
transform:translateY(-2px);
}

.secondary{
border:1px solid rgba(255,255,255,.2);
color:#eaeaea;
}

.secondary:hover{
background:rgba(255,255,255,.06);
}

/* subtle footer */

.note{
margin-top:40px;
font-size:13px;
opacity:.45;
line-height:1.6;
}

/* micro animation */

.wrapper{
animation:fade 0.8s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(12px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* mobile tweaks */

@media(max-width:480px){

h1{
font-size:34px;
}

.price{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="label">
Domain Available
</div>

<h1>litchainco.name.ng</h1>

<div class="accent"></div>

<p class="desc">
A short, memorable name suited for a blockchain company,
crypto infrastructure platform, fintech product, or
modern tech startup.
</p>

<div class="price">
₦100,000
</div>

<div class="actions">

<a class="btn primary" href="mailto:skyvfavy15501@gmail.com">
Purchase Domain
</a>

<a class="btn secondary" href="mailto:skyvfavy15501@gmail.com">
Make an Offer
</a>

</div>

<div class="note">
Direct inquiries only. Negotiations available.
</div>

</div>

</body>
</html>
